<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario | 5ta Esencia</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #2E1520; /* Fondo crema de tu marca */
            font-family: 'Lato', sans-serif;
        }

        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .register-card {
            background: white;
            padding: 2.5rem;
            border: 2px solid #C9A45C; /* Borde dorado original */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            color: #8B3A4A;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .btn-vinotinto {
            background-color: #600018;
            color: white;
            border: none;
            padding: 12px;
            transition: 0.3s;
        }

        .btn-vinotinto:hover {
            background-color: #8B3A4A;
            color: white;
            transform: translateY(-2px);
        }

        .form-control:focus {
            border-color: #C9A45C;
            box-shadow: 0 0 0 0.25rem #C9A45C;
        }

        #passStrength {
            font-size: 0.85rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="register-card">
            <div class="text-center mb-4">
                <h1 class="brand-title">5ta Esencia</h1>
                <p class="text-muted small text-uppercase fw-bold">Crear nueva cuenta</p>
            </div>

            <form id="registroForm" novalidate>
                
                <div class="mb-3">
                    <label for="regNombre" class="form-label small fw-bold">NOMBRE COMPLETO</label>
                    <input type="text" class="form-control" id="regNombre" required 
                           pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" placeholder="Ej. Victor Hernandez">
                    <div class="invalid-feedback">
                        El nombre solo debe contener letras y espacios.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="regTelefono" class="form-label small fw-bold">NÚMERO DE TELÉFONO</label>
                    <input type="text" class="form-control" id="regTelefono" required 
                           maxlength="10" minlength="10" pattern="\d{10}" placeholder="10 dígitos">
                    <div class="invalid-feedback">
                        Debes ingresar exactamente 10 números.
                    </div>
                </div>

                <div class="mb-3">
                    <label for="regEmail" class="form-label small fw-bold">EMAIL (USUARIO)</label>
                    <input type="email" class="form-control" id="regEmail" required placeholder="correo@ejemplo.com">
                    <div class="invalid-feedback">
                        Ingresa un correo electrónico válido.
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="regPass" class="form-label small fw-bold">CONTRASEÑA</label>
                        <input type="password" class="form-control" id="regPass" required minlength="6" placeholder="******">
                        <div id="passStrength" class="fw-bold mt-1"></div>
                        <div class="invalid-feedback">Mínimo 6 caracteres.</div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="regPassConfirm" class="form-label small fw-bold">CONFIRMAR</label>
                        <input type="password" class="form-control" id="regPassConfirm" required placeholder="******">
                        <div class="invalid-feedback">Las contraseñas no coinciden.</div>
                    </div>
                </div>

                <div id="regAlert" class="alert alert-warning d-none py-2 mt-2" role="alert">
                    <small>Este correo ya se encuentra registrado.</small>
                </div>

                <button type="submit" class="btn btn-vinotinto w-100 fw-bold mt-3">
                    REGISTRAR CUENTA
                </button>

                <div class="text-center mt-4">
                    <small class="text-muted">¿Ya tienes cuenta? <a href="login.html" class="text-decoration-none fw-bold" style="color: #C9A45C;">Inicia Sesión</a></small>
                </div>
            </form>
        </div>
    </div>

<script src="js/registro.js"></script>
</body>
</html>
